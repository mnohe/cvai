name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  functions:
    name: Functions (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: functions/go.sum

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Vet
        run: go vet ./...

      - name: Test
        run: |
          firebase emulators:exec \
            --only auth,firestore \
            --project demo-cvai \
            'go test -race ./...'
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
          FIREBASE_PROJECT_ID: demo-cvai

      - name: Build
        run: go build ./cmd/...

      - name: Docker smoke test
        run: |
          docker build -t cvai-ci .
          docker run --rm -d --name cvai-ci -p 8080:8080 cvai-ci
          sleep 2
          curl --fail http://localhost:8080/healthz
          docker stop cvai-ci

  web:
    name: Web (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run build

  # E2E job — activated in Stage 15 when the web app scaffold is added.
