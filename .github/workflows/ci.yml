name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  functions:
    name: Functions (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: functions/go.mod

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Vet
        run: go vet ./...

      - name: Test
        run: |
          firebase emulators:exec \
            --only auth,firestore \
            --project demo-cvai \
            'cd functions && go test -race -coverprofile=coverage.out -covermode=atomic ./...'
        working-directory: .
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
          FIREBASE_PROJECT_ID: demo-cvai

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./functions/coverage.out
          flags: functions
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build
        run: go build -o /tmp/cvai-functions ./cmd/...

      - name: Docker image build
        run: docker build -f functions/Dockerfile -t cvai-ci .
        working-directory: .

  web:
    name: Web (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./web/package-lock.json

      - run: npm ci
      - run: npm run build

  rules:
    name: Firestore Rules
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install rules test dependencies
        run: npm install

      - name: Run Firestore rules tests
        run: |
          firebase emulators:exec \
            --only firestore \
            --project demo-cvai \
            'npm run test:rules'

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [functions, web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./web/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Run Playwright
        run: |
          firebase emulators:exec \
            --only auth,firestore \
            --project demo-cvai \
            'npm --prefix web run test:e2e'
